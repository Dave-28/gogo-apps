<!DOCTYPE html>
<!-- @dsCard group="Components" name="Cards" subtitle="Default surface + brand surface" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #FAF6F9; }
  body { padding: 28px; display:grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #fff; border: 1px solid var(--border-subtle); border-radius: 12px; padding: 20px; box-shadow: var(--shadow-1); display:flex; flex-direction: column; gap: 10px }
  .card.brand { background: var(--gogo-purple-eclipse); color: #fff; border: 0; position: relative; overflow: hidden }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gogo-electric-rose); font-weight: 700 }
  .brand .eyebrow { color: var(--gogo-electric-rose) }
  h3 { font-family: var(--font-display); font-weight: 700; font-size: 20px; margin: 0; letter-spacing: -0.01em; color: var(--fg) }
  p  { font-size: 13px; color: var(--fg-muted); margin: 0; line-height: 1.5 }
  .brand h3 { color: #fff }
  .brand p  { color: rgba(255,255,255,.78) }
  .bolt { position: absolute; right: 16px; top: 16px; color: var(--gogo-electric-rose); width: 22px; height: 28px }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Swap Station</span>
    <h3>Kabalagala</h3>
    <p>14 batteries available · open until 22:00 · 1.2 km away</p>
  </div>
  <div class="card brand">
    <svg class="bolt" viewBox="0 0 24 32" fill="currentColor"><path d="M14.4 0 0 17.6h8.8L6.4 32 24 12.8h-9.6L17.6 0z"/></svg>
    <span class="eyebrow">This week</span>
    <h3>UGX 142,000 earned</h3>
    <p>23 swaps · 4 days riding · 312 km</p>
  </div>
</body></html>

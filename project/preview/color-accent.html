<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color — Accent" subtitle="Orange / Yellow / Red — emphasis only" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 22px 28px; display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px }
  .swatch { display:flex; flex-direction:column; gap: 10px }
  .chip { width: 100%; height: 64px; border-radius: 10px; }
  .name { font-family:var(--font-display); font-weight: 700; font-size: 15px; color: var(--fg) }
  .vals { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); line-height: 1.5 }
  .rule { font-size: 11px; color: var(--gogo-turbo-red); font-weight:600; margin-top: 6px; letter-spacing: 0.02em }
</style>
</head>
<body>
  <div class="swatch">
    <div class="chip" style="background:#DE5307"></div>
    <div class="name">Energetic Orange</div>
    <div class="vals">#DE5307 · 166 C</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#F7B500"></div>
    <div class="name">Buzzing Yellow</div>
    <div class="vals">#F7B500 · 116 C</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#BB1E10"></div>
    <div class="name">Turbo Red</div>
    <div class="vals">#BB1E10 · 3546 C</div>
  </div>
  <div style="grid-column: 1 / -1; padding-top: 4px; border-top: 1px solid var(--border-subtle); display:flex; gap: 24px; font-size: 12px; color: var(--fg-muted)">
    <span>✕ No solid backgrounds</span>
    <span>✕ Never combined</span>
    <span>✕ No gradients</span>
    <span style="margin-left:auto; color: var(--fg)">Emphasis only — charts, single highlights, alerts.</span>
  </div>
</body></html>

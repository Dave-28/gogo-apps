<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo variants" subtitle="Full colour / Inverse / White" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 24px 28px; display:flex; align-items:center; gap: 32px; flex-wrap:wrap }
  .logo { display:flex; align-items:center; gap: 14px }
  .swatch { padding: 16px 18px; border-radius: 12px; display:flex; align-items:center; justify-content:center; min-width: 200px; min-height: 76px }
  img { height: 36px; width: auto; display:block }
  .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-muted); font-weight: 700; margin-top: 6px; text-align:center }
  .col { display:flex; flex-direction:column; align-items:center }
</style>
</head>
<body>
  <div class="col">
    <div class="swatch" style="background:#fff; border: 1px solid var(--border-subtle)"><img src="../assets/logo-full-colour.png" alt=""></div>
    <span class="label">Full colour</span>
  </div>
  <div class="col">
    <div class="swatch" style="background:#40103C"><img src="../assets/logo-inverse.png" alt=""></div>
    <span class="label">Inverse · on brand</span>
  </div>
  <div class="col">
    <div class="swatch" style="background:#15010C"><img src="../assets/logo-white.png" alt=""></div>
    <span class="label">1-colour white</span>
  </div>
</body></html>

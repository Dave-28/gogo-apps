<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color — Semantic tokens" subtitle="–bg, –fg, –action, –success/warning/danger" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 22px 28px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px }
  .row { display:flex; align-items:center; gap: 14px }
  .swatch { width: 40px; height: 40px; border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(21,1,12,.06); flex-shrink:0 }
  .token { font-family: var(--font-mono); font-size: 12px; color: var(--fg) }
  .desc  { font-size: 12px; color: var(--fg-muted); margin-left: auto; text-align: right }
</style>
</head>
<body>
  <div class="row"><div class="swatch" style="background:var(--bg)"></div><div class="token">--bg</div><div class="desc">Default surface</div></div>
  <div class="row"><div class="swatch" style="background:var(--bg-subtle)"></div><div class="token">--bg-subtle</div><div class="desc">Section alt</div></div>
  <div class="row"><div class="swatch" style="background:var(--fg)"></div><div class="token">--fg</div><div class="desc">Body text</div></div>
  <div class="row"><div class="swatch" style="background:var(--fg-muted)"></div><div class="token">--fg-muted</div><div class="desc">Secondary text</div></div>
  <div class="row"><div class="swatch" style="background:var(--fg-brand)"></div><div class="token">--fg-brand</div><div class="desc">Headlines · brand</div></div>
  <div class="row"><div class="swatch" style="background:var(--action)"></div><div class="token">--action</div><div class="desc">Primary CTA</div></div>
  <div class="row"><div class="swatch" style="background:var(--success)"></div><div class="token">--success</div><div class="desc">Confirmed swap</div></div>
  <div class="row"><div class="swatch" style="background:var(--warning)"></div><div class="token">--warning</div><div class="desc">Low battery</div></div>
  <div class="row"><div class="swatch" style="background:var(--danger)"></div><div class="token">--danger</div><div class="desc">Offline · error</div></div>
  <div class="row"><div class="swatch" style="background:var(--border)"></div><div class="token">--border</div><div class="desc">Default border</div></div>
</body></html>

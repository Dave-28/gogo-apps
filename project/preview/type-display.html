<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type — Display" subtitle="Mundial Black/Bold display scale" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-muted); font-weight: 700; min-width: 96px; }
  .spec  { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
  .stack > * + * { margin-top: 14px; }
  .specimen { color: var(--fg); }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Display XL</span>
    <span class="specimen" style="font-family:var(--font-display);font-weight:900;font-size:64px;line-height:.94;letter-spacing:-0.025em">Keep Moving.</span>
    <span class="spec">Mundial Black · 96/0.94 · -2.5%</span>
  </div>
  <div class="row">
    <span class="label">Display L</span>
    <span class="specimen" style="font-family:var(--font-display);font-weight:700;font-size:52px;line-height:.96;letter-spacing:-0.022em">Power your journey</span>
    <span class="spec">Mundial Bold · 72/0.96</span>
  </div>
  <div class="row">
    <span class="label">Display M</span>
    <span class="specimen" style="font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1;letter-spacing:-0.02em">Join the Charge</span>
    <span class="spec">Mundial Bold · 56/1.00</span>
  </div>
</div>
</body></html>

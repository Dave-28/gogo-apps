<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4-px base unit, –s-1 through –s-16" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 22px 28px; }
  .row { display: grid; grid-template-columns: 60px 1fr 64px; align-items: center; gap: 16px; padding: 6px 0; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg) }
  .bar  { background: var(--gogo-electric-rose); height: 14px; border-radius: 3px; }
  .px   { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right }
</style>
</head>
<body>
  <div class="row"><div class="name">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">--s-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="name">--s-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">--s-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="name">--s-16</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
</body></html>

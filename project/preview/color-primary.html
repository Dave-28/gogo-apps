<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color — Primary" subtitle="Purple Eclipse + Electric Rose" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 24px 28px; display:grid; grid-template-columns: 1fr 1fr; gap: 18px }
  .swatch { display:flex; gap: 14px; align-items:center }
  .chip { width: 96px; height: 96px; border-radius: 12px; flex-shrink:0; box-shadow: inset 0 0 0 1px rgba(21,1,12,.06) }
  .meta { display:flex; flex-direction:column; gap: 4px }
  .name { font-family:var(--font-display); font-weight: 700; font-size: 17px; color: var(--fg) }
  .role { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-muted); font-weight: 700 }
  .vals { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); line-height: 1.5; margin-top: 4px }
</style>
</head>
<body>
  <div class="swatch">
    <div class="chip" style="background:#40103C"></div>
    <div class="meta">
      <div class="role">Primary</div>
      <div class="name">Purple Eclipse</div>
      <div class="vals">#40103C<br>RGB 64 · 16 · 60<br>Pantone 262 C</div>
    </div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#D20C7D"></div>
    <div class="meta">
      <div class="role">Primary</div>
      <div class="name">Electric Rose</div>
      <div class="vals">#D20C7D<br>RGB 210 · 12 · 125<br>Pantone 233 C</div>
    </div>
  </div>
</body></html>

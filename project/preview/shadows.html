<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Shadows / Elevation" subtitle="Four-tier warm-tinted elevation" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #FAF6F9; }
  body { padding: 32px 28px; display:grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 14px }
  .card { width: 100%; height: 72px; background: #fff; border-radius: 12px }
  .lvl { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--fg) }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align:center }
</style>
</head>
<body>
  <div class="col"><div class="card" style="box-shadow: var(--shadow-1)"></div><div class="lvl">Shadow 1</div><div class="desc">Resting card</div></div>
  <div class="col"><div class="card" style="box-shadow: var(--shadow-2)"></div><div class="lvl">Shadow 2</div><div class="desc">Hovered card</div></div>
  <div class="col"><div class="card" style="box-shadow: var(--shadow-3)"></div><div class="lvl">Shadow 3</div><div class="desc">Popover / sheet</div></div>
  <div class="col"><div class="card" style="box-shadow: var(--shadow-4)"></div><div class="lvl">Shadow 4</div><div class="desc">Modal</div></div>
</body></html>

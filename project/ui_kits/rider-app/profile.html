<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Rider App" name="Rider App — Profile" subtitle="Rider details, saved bike, settings" viewport="390x920" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>GOGO Rider — Profile</title>
<link rel="stylesheet" href="rider.css">
<style>
  .head { padding: 8px 24px 24px; display:flex; flex-direction:column; align-items:center; text-align:center }
  .photo { width: 88px; height: 88px; border-radius: 50%; background: var(--gogo-purple-eclipse); color:#fff; display:flex; align-items:center; justify-content:center; font-family: var(--font-display); font-weight: 900; font-size: 36px; margin-bottom: 12px }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.01em }
  .role { color: var(--fg-muted); font-size: 13px; margin-top: 2px }
  .bike-card { margin: 0 20px 18px; background: var(--gogo-purple-eclipse); color:#fff; border-radius: 18px; padding: 18px; display:flex; align-items:center; gap: 14px; overflow: hidden }
  .bike-card img { width: 100px; height: auto; flex-shrink: 0 }
  .bike-card .eyebrow { color: var(--gogo-electric-rose) }
  .bike-card h3 { font-family: var(--font-display); font-weight: 700; font-size: 20px; margin: 4px 0 4px; letter-spacing: -0.01em; color: #fff }
  .bike-card .meta { color: rgba(255,255,255,.7); font-size: 12px }
  .list { padding: 0 20px }
  .item { display:flex; align-items:center; gap: 14px; padding: 14px 0; border-top: 1px solid var(--border-subtle); font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--fg); text-decoration:none }
  .item:first-of-type { border-top: 0 }
  .item .ico { width: 36px; height: 36px; background: var(--gogo-ink-100); border-radius: 10px; display:flex; align-items:center; justify-content:center; color: var(--gogo-purple-eclipse) }
  .item .arrow { margin-left:auto; color: var(--fg-subtle); font-size: 18px }
  .footer-info { padding: 24px; color: var(--fg-muted); font-size: 11px; text-align:center; letter-spacing: 0.04em }
</style>
</head>
<body>
<div class="phone" data-screen-label="Profile">
  <div class="status-bar"><span>9:41</span></div>
  <div class="head">
    <div class="photo">JM</div>
    <div class="name">John Mukasa</div>
    <div class="role">E-Boda rider · Kampala</div>
  </div>

  <div class="bike-card">
    <img src="../../assets/ev-bike-white.png" alt="">
    <div>
      <span class="eyebrow">My bike</span>
      <h3>E-Boda · EV-150</h3>
      <div class="meta">Serial 14-A8F2 · Active</div>
    </div>
  </div>

  <div class="content">
  <div class="list">
    <a class="item" href="#"><span class="ico">📋</span>KYC & documents<span class="arrow">›</span></a>
    <a class="item" href="#"><span class="ico">🛵</span>Bike & service history<span class="arrow">›</span></a>
    <a class="item" href="#"><span class="ico">💳</span>Payment methods<span class="arrow">›</span></a>
    <a class="item" href="#"><span class="ico">🌐</span>Language &nbsp;<span style="color:var(--fg-muted);font-weight:400">English</span><span class="arrow">›</span></a>
    <a class="item" href="#"><span class="ico">❓</span>Help & support<span class="arrow">›</span></a>
    <a class="item" href="#" style="color: var(--gogo-turbo-red)"><span class="ico" style="background: rgba(187,30,16,.1); color: var(--gogo-turbo-red)">↩</span>Sign out</a>
  </div>
  <div class="footer-info">GOGO RIDER · v1.0.0</div>
  </div>

  <nav class="tab-bar">
    <a class="tab" href="home-map.html"><span class="ico"><svg viewBox="0 0 24 24" fill="currentColor" width="24"><path d="M9 20H4v-8H1L12 2l11 10h-3v8h-5v-6H9v6z"/></svg></span>Home</a>
    <a class="tab" href="swap-reserve.html"><span class="ico"><svg viewBox="0 0 24 32" fill="currentColor" width="20"><path d="M14.4 0 0 17.6h8.8L6.4 32 24 12.8h-9.6L17.6 0z"/></svg></span>Swap</a>
    <a class="tab" href="wallet.html"><span class="ico"><svg viewBox="0 0 24 24" fill="currentColor" width="24"><path d="M3 6a3 3 0 013-3h12v3H6a1 1 0 000 2h13v10a3 3 0 01-3 3H6a3 3 0 01-3-3V6zm14 6a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg></span>Wallet</a>
    <a class="tab on" href="profile.html"><span class="ico"><svg viewBox="0 0 24 24" fill="currentColor" width="24"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.4 0-8 2.7-8 6v2h16v-2c0-3.3-3.6-6-8-6z"/></svg></span>Profile</a>
  </nav>
</div>
</body></html>

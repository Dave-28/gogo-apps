<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Swap Ops" name="Swap Ops Dashboard" subtitle="HQ ops — network overview, swap log" viewport="1300x900" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GOGO · Swap Ops Dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../kit.css">
<style>
  .frames.web {
    grid-template-columns: 1fr;
    max-width: 1320px;
    gap: 56px 0;
  }
  .frame-wrap.web {
    width: 100%;
    align-items: stretch;
  }
  .web-scale {
    width: 1320px;
    height: calc(900px * (1320 / 1440));
    overflow: hidden;
    border-radius: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    border: 1px solid #1B233A;
    background: #05070F;
  }
  .web-scale > div {
    transform: scale(0.91667); /* 1320/1440 */
    transform-origin: top left;
  }
  .frame-label.web { align-self: flex-start; margin-bottom: 4px; }
  .web-note {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11px; color: var(--fg-3);
    margin-top: 8px; align-self: flex-start;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <a href="../index.html" class="kit-back">← All apps</a>

  <div class="kit-header">
    <div>
      <div class="kit-eyebrow">08 · INTERNAL</div>
      <h1 class="kit-title">SWAP OPS<br/>DASHBOARD</h1>
      <p class="kit-sub">For the team running the network. Live look at every station, every swap, every alert — across Kampala, Wakiso, and Mukono.</p>
    </div>
    <div class="kit-meta">
      <div><strong>2 screens</strong></div>
      <div>Web · 1440×900</div>
      <div>dark · navy + magenta</div>
    </div>
  </div>

  <div class="frames web" id="root"></div>

  <script type="text/babel" src="../swap-officer/dark-components.jsx"></script>
  <script type="text/babel" src="./screens.jsx"></script>
  <script type="text/babel">
    function Kit() {
      const frames = [
        { num: '01', label: 'Overview — live KPIs, stations, alerts, recent swaps',
          note: 'The "is the network healthy right now?" view. Five KPIs, swap-by-hour bar, three open alerts, station grid, live tail of recent closures.',
          el: <OverviewScreen/> },
        { num: '02', label: 'Stations — full list, sortable, filterable',
          note: 'Drill from the Overview. Every station as a row — area, status, queue, throughput, revenue, uptime, on-shift officer.',
          el: <StationsScreen/> },
      ];
      return frames.map((f, i) => (
        <div className="frame-wrap web" key={i}>
          <div className="frame-label web"><span className="frame-num">{f.num}</span>{f.label}</div>
          <div className="web-scale"><div><f.el.type/></div></div>
          <div className="web-note">{f.note}</div>
        </div>
      ));
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Kit/>);
  </script>
</body>
</html>
